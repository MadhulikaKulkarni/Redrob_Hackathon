ai_usage_summary: |
Used ChatGPT for architectural discussion, debugging,
code explanations, and project guidance. All ranking
logic, testing, and final decisions were implemented
and validated manually. No candidate data was sent to
external APIs during ranking.

methodology_summary: |
Built a hybrid candidate ranking system that combines
semantic embeddings, feature engineering, career
analysis, behavioral signals, and honeypot detection.
Candidate and job description embeddings are generated
using sentence-transformers/all-MiniLM-L6-v2 and ranked
using a weighted scoring framework that incorporates
semantic similarity, title priors, experience, career
evidence, and recruiter behavior signals. The system
produces explainable rankings and was optimized to run
fully offline on CPU.

